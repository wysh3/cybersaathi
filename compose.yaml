services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: cybersaathi-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: cybersaathi
      POSTGRES_PASSWORD: cybersaathi
      POSTGRES_DB: cybersaathi
    ports:
      - "5432:5432"
    volumes:
      - cybersaathi-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cybersaathi -d cybersaathi"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  cybersaathi-postgres-data:
